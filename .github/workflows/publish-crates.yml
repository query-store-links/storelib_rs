name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # OIDC token for crates.io Trusted Publishing

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [[ "$tag" != "$crate_version" ]]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match Cargo.toml version '$crate_version'."
            exit 1
          fi

      # Exchanges this workflow's GitHub OIDC token for a short-lived crates.io
      # API token (no CARGO_REGISTRY_TOKEN secret needed). Requires Trusted
      # Publishing to be configured on the crate at crates.io.
      - name: Exchange OIDC token for crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish
